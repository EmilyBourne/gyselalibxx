name: Clean up

on:
  check_run:
    types: completed

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  SetLabels:
    runs-on: ubuntu-latest
    name: Set PR labels
    if: github.event.check_run.pull_requests

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set draft due to failure
      if: github.event.check_run.conclusion == 'failure'
      run: |
        isDraft=$(gh pr view --json isDraft ${{ github.event.check_run.pull_requests[0].number }} | jq ."isDraft")
        if [[ "${isDraft}" != "true" ]]
        then
          gh pr ready ${{ github.event.check_run.pull_requests[0].number }} --undo
          gh pr comment -b "This PR is failing tests so it has been put back into draft. Please remove the draft status when the tests pass."
          gh pr edit --remove-label "Ready to review"
        fi
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
    - name: Set draft due to cancellation
      if: github.event.check_run.conclusion == 'cancelled'
      run: |
        isDraft=$(gh pr view --json isDraft ${{ github.event.check_run.pull_requests[0].number }} | jq ."isDraft")
        if [[ "${isDraft}" != "true" ]]
        then
          gh pr ready ${{ github.event.check_run.pull_requests[0].number }} --undo
          gh pr comment -b "It seems like you haven't finished working on this PR so it has been put back into draft. Please remove the draft status when the PR can run tests without being interrupted."
          gh pr edit --remove-label "Ready to review"
        fi
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
    - name: Set ready
      if: github.event.check_run.conclusion == 'success'
      run: |
        isDraft=$(gh pr view --json isDraft ${{ github.event.check_run.pull_requests[0].number }} | jq ."isDraft")
        if [[ "${isDraft}" != "true" ]]
        then
          STATES=$(gh pr checks ${{ github.event.check_run.pull_requests[0].number }} --required --json state)
          N_PASSES=$(echo $STATES | grep -o "\"state\":\"SUCCESS\"" | wc -l)
          if [[ ${N_PASSES} == 10 ]]
          then
            # If all required tests are passing then mark as ready to review
            gh pr edit --add-label "Ready to review"
          fi
        fi
